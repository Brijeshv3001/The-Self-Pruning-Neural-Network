# =================================================================
# File: config.yaml
# Project: The Self-Pruning Neural Network
# Description: All hyperparameters in one YAML config file
# =================================================================

training:
  lambda_val: 1e-4
  epochs: 30
  batch_size: 128
  lr: 0.001
  seed: 42
  save_dir: "experiments"

pruning:
  temperature: 1.0
  t_end: 0.01
  rehab_thresh: 0.05
  rehab_epochs: 5

model:
  num_classes: 10
